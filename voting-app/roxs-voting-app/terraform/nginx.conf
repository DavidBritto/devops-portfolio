events {
    worker_connections 1024;
}

http {
    upstream vote {
        server vote:5000;
    }

    upstream result {
        server result:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://vote;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /result {
            proxy_pass http://result;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}