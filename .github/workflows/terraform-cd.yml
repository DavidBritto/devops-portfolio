name: Terraform CD - Despliegue con LocalStack

on:
  push:
    branches: [main]
    paths:
      - 'voting-app/roxs-voting-app/terraform/**.tf'
      - 'voting-app/roxs-voting-app/terraform/**.tfvars'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a desplegar'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Acción a realizar'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: 1.6.0
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  WORKING_DIR: voting-app/roxs-voting-app/terraform

jobs:
  deploy-dev:
    name: Desplegar a Desarrollo
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: development

    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: s3,ec2,iam,lambda,cloudformation,logs,events
          DEBUG: 1
          PERSISTENCE: 1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar permisos de scripts
      run: |
        chmod +x ${{ env.WORKING_DIR }}/scripts/setup-localstack.sh
        chmod +x ${{ env.WORKING_DIR }}/scripts/wait-for-localstack.sh

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup AWS CLI
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install --update

    - name: Configurar LocalStack
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        export AWS_ENDPOINT_URL=http://localhost:4566
        ./scripts/setup-localstack.sh

    - name: Terraform Init
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform init \
          -backend-config="endpoints={s3=\"http://localhost:4566\"}" \
          -backend-config="access_key=test" \
          -backend-config="secret_key=test" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="skip_region_validation=true" \
          -backend-config="force_path_style=true" \
          -reconfigure
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Seleccionar workspace dev
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform workspace select dev || terraform workspace new dev
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Terraform Plan
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform plan \
          -var-file="environments/dev.tfvars" \
          -out=dev.tfplan
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Terraform Apply
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -auto-approve dev.tfplan
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Verificar estado en S3
      run: |
        echo "Verificando estado en LocalStack S3..."
        aws --endpoint-url=http://localhost:4566 s3 ls s3://terraform-state-roxs/ --recursive

  deploy-staging:
    name: Desplegar a Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging

    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: s3,ec2,iam,lambda,cloudformation,logs,events
          DEBUG: 1
          PERSISTENCE: 1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar permisos de scripts
      run: |
        chmod +x ${{ env.WORKING_DIR }}/scripts/setup-localstack.sh
        chmod +x ${{ env.WORKING_DIR }}/scripts/wait-for-localstack.sh

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup AWS CLI
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install --update

    - name: Configurar LocalStack
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        export AWS_ENDPOINT_URL=http://localhost:4566
        ./scripts/setup-localstack.sh

    - name: Terraform Init
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform init \
          -backend-config="endpoints={s3=\"http://localhost:4566\"}" \
          -backend-config="access_key=test" \
          -backend-config="secret_key=test" \
          -backend-config="skip_credentials_validation=true" \
          -backend-config="skip_metadata_api_check=true" \
          -backend-config="skip_region_validation=true" \
          -backend-config="force_path_style=true" \
          -reconfigure
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Seleccionar workspace staging
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform workspace select staging || terraform workspace new staging
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Terraform Plan
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform plan \
          -var-file="environments/staging.tfvars" \
          -out=staging.tfplan
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Terraform Apply
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -auto-approve staging.tfplan
      env:
        AWS_ENDPOINT_URL: http://localhost:4566

    - name: Verificar estado en S3
      run: |
        echo "Verificando estado en LocalStack S3..."
        aws --endpoint-url=http://localhost:4566 s3 ls s3://terraform-state-roxs/ --recursivels