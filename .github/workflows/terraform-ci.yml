name: terraform-ci
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.5 }
      - run: terraform -chdir=voting-app/roxs-votingapp/terraform init -backend=false
      - run: terraform -chdir=voting-app/roxs-votingapp/terraform fmt -check -recursive
      - run: terraform -chdir=voting-app/roxs-votingapp/terraform validate
